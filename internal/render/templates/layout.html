{{define "head"}}<!doctype html>
<html lang="en" class="h-full dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{{.Title}} · Splitwise-QUIC</title>
  <meta name="cert-hash" content="{{.CertHash}}">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "ui-sans-serif", "system-ui", "-apple-system", "Segoe UI", "Roboto", "sans-serif"],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>

  <!-- Component classes — dark: variants always win because <html> has class="dark" -->
  <style type="text/tailwindcss">
    @layer components {
      .card {
        @apply rounded-2xl border border-white/[.07] bg-slate-900/65 p-5
               shadow-xl shadow-black/40 backdrop-blur-md
               dark:border-white/[.07] dark:bg-slate-900/65 dark:shadow-black/40;
      }
      .card-title {
        @apply mb-4 flex items-center gap-2 text-xs font-bold uppercase tracking-widest
               text-slate-500 dark:text-slate-500;
      }
      .input {
        @apply w-full rounded-xl border border-white/10 bg-slate-800/80 px-3 py-2.5
               text-sm text-slate-100 shadow-sm outline-none transition
               placeholder:text-slate-600
               focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/25
               dark:border-white/10 dark:bg-slate-800/80 dark:text-slate-100;
      }
      .label {
        @apply mb-1.5 block text-sm font-medium text-slate-300 dark:text-slate-300;
      }
      .btn {
        @apply inline-flex items-center justify-center gap-2 rounded-xl px-4 py-2.5
               text-sm font-semibold transition-all duration-150
               focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-offset-slate-950
               disabled:cursor-not-allowed disabled:opacity-50;
      }
      .btn-primary {
        @apply btn bg-gradient-to-b from-emerald-500 to-emerald-600 text-white
               shadow-md shadow-emerald-600/20
               hover:from-emerald-400 hover:to-emerald-500 hover:shadow-emerald-500/30
               focus:ring-emerald-500/50 active:scale-[.98];
      }
      .btn-secondary {
        @apply btn border border-white/10 bg-white/5 text-slate-200
               hover:bg-white/10 hover:text-white
               focus:ring-slate-500/40 active:scale-[.98]
               dark:border-white/10 dark:bg-white/5;
      }
      .btn-ghost {
        @apply inline-flex items-center justify-center gap-1.5 rounded-lg
               px-2.5 py-1.5 text-xs font-semibold
               text-emerald-400 transition-all duration-150
               hover:bg-emerald-500/15 hover:text-emerald-300
               focus:outline-none focus:ring-2 focus:ring-emerald-500/30
               dark:text-emerald-400;
      }
      .icon-btn {
        @apply inline-flex h-9 w-9 items-center justify-center rounded-xl
               border border-white/10 bg-white/5 text-slate-400 transition
               hover:bg-white/10 hover:text-slate-200
               focus:outline-none focus:ring-2 focus:ring-emerald-500/40
               dark:border-white/10 dark:bg-white/5 dark:text-slate-400;
      }
      .pill {
        @apply inline-flex items-center gap-1.5 rounded-full px-2.5 py-0.5 text-xs font-medium;
      }
      .link {
        @apply font-medium text-emerald-400 transition hover:text-emerald-300 hover:underline
               dark:text-emerald-400;
      }
      .muted { @apply text-slate-500 dark:text-slate-500; }
      .divider { @apply border-white/[.07] dark:border-white/[.07]; }
    }
  </style>

  <!-- Background, starfield, animations -->
  <style>
    html { scroll-behavior: smooth; }

    body {
      background:
        radial-gradient(ellipse 1100px 650px at 90% -5%,  rgba(16,185,129,.16), transparent 55%),
        radial-gradient(ellipse 900px 600px at 0%  10%,   rgba(79,70,229,.18),  transparent 55%),
        radial-gradient(ellipse 700px 500px at 50% 100%,  rgba(16,185,129,.07), transparent 60%),
        linear-gradient(180deg, #07090f 0%, #050810 55%, #04060d 100%);
      min-height: 100dvh;
    }

    #starfield {
      position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none;
    }
    .star {
      position: absolute; border-radius: 9999px;
      background: #ffffff;
      box-shadow: 0 0 4px 1px rgba(255,255,255,.35);
      animation: twinkle var(--dur, 3s) ease-in-out var(--delay, 0s) infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: calc(var(--max, .5) * .15); transform: scale(.65); }
      50%      { opacity: var(--max, .5); transform: scale(1); }
    }
    .shooting-star {
      position: absolute; height: 1.5px; width: 100px;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.95));
      border-radius: 9999px; opacity: 0;
      filter: drop-shadow(0 0 5px rgba(255,255,255,.75));
      animation: shoot var(--sdur, 6s) ease-in var(--sdelay, 0s) infinite;
    }
    @keyframes shoot {
      0%   { opacity: 0; transform: translate3d(0,0,0) rotate(20deg); }
      5%   { opacity: 1; }
      18%  { opacity: 0; transform: translate3d(500px,195px,0) rotate(20deg); }
      100% { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .star, .shooting-star { animation: none !important; }
    }

    /* HTMX fade transitions */
    .htmx-swapping { opacity: 0; transition: opacity .12s ease-out; }
    .htmx-settling  { opacity: 1; transition: opacity .18s ease-in; }

    /* iOS safe-area padding for footer */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      footer { padding-bottom: calc(1.5rem + env(safe-area-inset-bottom)); }
    }
  </style>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%92%B8</text></svg>">
</head>
<body class="min-h-full font-sans text-slate-200 antialiased">
  <div id="starfield" aria-hidden="true"></div>

  <header class="sticky top-0 z-30 border-b border-white/[.07] bg-slate-950/80 backdrop-blur-xl">
    <div class="mx-auto flex max-w-6xl items-center justify-between gap-3 px-4 py-3">
      <a href="/" class="flex shrink-0 items-center gap-2 text-lg font-extrabold tracking-tight">
        <span class="grid h-8 w-8 place-items-center rounded-xl bg-gradient-to-br from-emerald-400 to-teal-600 text-white shadow-md shadow-emerald-500/30">$</span>
        <span class="text-white">Splitwise<span class="text-emerald-400">·QUIC</span></span>
      </a>
      <nav class="flex min-w-0 items-center gap-2 sm:gap-3">
        <span id="proto-badge" class="hidden sm:inline-flex pill border border-white/[.07] bg-white/5 font-mono text-[11px] text-slate-500">proto: …</span>
        {{if .User}}
          <span class="hidden min-w-0 truncate text-sm text-slate-500 md:block">
            Hi, <span class="font-semibold text-slate-300">{{.User.Name}}</span>
          </span>
        {{end}}
        {{if .User}}
          <a href="/logout"
             class="shrink-0 rounded-xl border border-white/[.07] bg-white/5 px-3 py-1.5 text-xs font-semibold text-slate-400 transition hover:bg-white/10 hover:text-white">
            Log out
          </a>
        {{end}}
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-8">
    {{if .Flash}}
    <div role="alert" class="mb-6 flex items-start gap-2.5 rounded-xl border border-amber-300 bg-amber-50 px-4 py-3 text-sm text-amber-800 shadow-sm dark:border-amber-500/30 dark:bg-amber-500/10 dark:text-amber-200">
      <svg class="mt-0.5 h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/></svg>
      <span>{{.Flash}}</span>
    </div>
    {{end}}
{{end}}

{{define "foot"}}
  </main>
  <footer class="mx-auto max-w-6xl px-4 py-8 text-center text-xs text-slate-700">
    Served over <span class="font-semibold text-emerald-600">HTTP/3 + QUIC</span>
    · live updates via QUIC DATAGRAMs / WebTransport · built by sinki
  </footer>
  <div id="toast"
       class="pointer-events-none fixed bottom-5 right-4 left-4 z-50 translate-y-2 sm:left-auto sm:max-w-xs
              rounded-2xl border border-white/10 bg-slate-800/95 px-4 py-3 text-sm font-medium text-white
              opacity-0 shadow-2xl backdrop-blur-md transition-all duration-300"></div>
  <script src="/static/app.js"></script>
</body>
</html>
{{end}}
