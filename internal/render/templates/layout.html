{{define "head"}}<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} · Splitwise-QUIC</title>
  <meta name="cert-hash" content="{{.CertHash}}">

  <!-- Apply saved theme BEFORE paint to avoid a flash of the wrong mode -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("theme");
        if (t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "ui-sans-serif", "system-ui", "-apple-system", "Segoe UI", "Roboto", "sans-serif"],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>

  <!-- Reusable component classes (compiled by the Tailwind Play CDN) -->
  <style type="text/tailwindcss">
    @layer components {
      .card {
        @apply rounded-2xl border border-slate-200/80 bg-white/85 p-5 shadow-sm shadow-slate-200/50 backdrop-blur
               dark:border-white/10 dark:bg-slate-900/60 dark:shadow-black/40;
      }
      .card-title {
        @apply mb-4 flex items-center gap-2 text-xs font-bold uppercase tracking-widest text-slate-500
               dark:text-slate-400;
      }
      .input {
        @apply w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-800 shadow-sm outline-none
               transition placeholder:text-slate-400 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/30
               dark:border-white/10 dark:bg-slate-800/70 dark:text-slate-100 dark:placeholder:text-slate-500;
      }
      .label {
        @apply mb-1.5 block text-sm font-medium text-slate-600 dark:text-slate-300;
      }
      .btn {
        @apply inline-flex items-center justify-center gap-2 rounded-xl px-4 py-2 text-sm font-semibold transition
               focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-transparent
               disabled:cursor-not-allowed disabled:opacity-50;
      }
      .btn-primary {
        @apply btn bg-emerald-600 text-white shadow-sm shadow-emerald-600/30 hover:bg-emerald-500
               focus:ring-emerald-500/50 active:scale-[.98];
      }
      .btn-secondary {
        @apply btn bg-slate-800 text-white hover:bg-slate-700 focus:ring-slate-500/40 active:scale-[.98]
               dark:bg-white/10 dark:hover:bg-white/20;
      }
      .btn-ghost {
        @apply btn bg-emerald-500/10 text-emerald-700 hover:bg-emerald-500/20 focus:ring-emerald-500/30
               dark:text-emerald-300 dark:hover:bg-emerald-500/20;
      }
      .icon-btn {
        @apply inline-flex h-9 w-9 items-center justify-center rounded-xl border border-slate-200/80 bg-white/70 text-slate-600
               transition hover:bg-white hover:text-slate-900 focus:outline-none focus:ring-2 focus:ring-emerald-500/40
               dark:border-white/10 dark:bg-white/5 dark:text-slate-300 dark:hover:bg-white/10 dark:hover:text-white;
      }
      .pill {
        @apply inline-flex items-center gap-1.5 rounded-full px-3 py-1 text-xs font-medium;
      }
      .link { @apply font-medium text-emerald-700 hover:underline dark:text-emerald-400; }
      .muted { @apply text-slate-500 dark:text-slate-400; }
      .divider { @apply border-slate-200/80 dark:border-white/10; }
    }
  </style>

  <!-- Starfield + animated gradient background -->
  <style>
    body {
      background:
        radial-gradient(1100px 600px at 80% -10%, rgba(16,185,129,.10), transparent 60%),
        radial-gradient(900px 500px at 0% 0%, rgba(99,102,241,.10), transparent 55%),
        linear-gradient(180deg, #f8fafc 0%, #f1f5f9 55%, #eef2ff 100%);
    }
    .dark body {
      background:
        radial-gradient(1000px 600px at 85% -10%, rgba(16,185,129,.18), transparent 55%),
        radial-gradient(900px 600px at 5% 5%, rgba(79,70,229,.20), transparent 55%),
        linear-gradient(180deg, #0b1020 0%, #060912 55%, #0a0a1a 100%);
    }
    #starfield {
      position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none;
    }
    .star {
      position: absolute; border-radius: 9999px;
      background: #1e293b; opacity: .12;
      animation: twinkle var(--dur, 3s) ease-in-out var(--delay, 0s) infinite;
    }
    .dark .star {
      background: #ffffff;
      box-shadow: 0 0 6px 1px rgba(255,255,255,.45);
    }
    @keyframes twinkle {
      0%, 100% { opacity: calc(var(--max, .6) * .2); transform: scale(.7); }
      50%      { opacity: var(--max, .6); transform: scale(1); }
    }
    .shooting-star {
      position: absolute; height: 2px; width: 90px;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.9));
      border-radius: 9999px; opacity: 0; filter: drop-shadow(0 0 6px rgba(255,255,255,.7));
      animation: shoot var(--sdur, 6s) ease-in var(--sdelay, 0s) infinite;
    }
    .dark .shooting-star { display: block; }
    .shooting-star { display: none; }
    @keyframes shoot {
      0%   { opacity: 0; transform: translate3d(0,0,0) rotate(18deg); }
      6%   { opacity: 1; }
      18%  { opacity: 0; transform: translate3d(420px,160px,0) rotate(18deg); }
      100% { opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      .star, .shooting-star { animation: none !important; }
    }
  </style>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%92%B8</text></svg>">
</head>
<body class="min-h-full font-sans text-slate-800 antialiased dark:text-slate-200">
  <div id="starfield" aria-hidden="true"></div>

  <header class="sticky top-0 z-30 border-b divider bg-white/70 backdrop-blur-lg dark:bg-slate-950/60">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3">
      <a href="/" class="flex items-center gap-2 text-lg font-extrabold tracking-tight">
        <span class="grid h-8 w-8 place-items-center rounded-xl bg-gradient-to-br from-emerald-500 to-teal-600 text-white shadow-sm">$</span>
        <span class="text-slate-900 dark:text-white">Splitwise<span class="text-emerald-500">·QUIC</span></span>
      </a>
      <nav class="flex items-center gap-2 sm:gap-3">
        <span id="proto-badge" class="pill border border-slate-200/80 bg-white/60 font-mono text-slate-600 dark:border-white/10 dark:bg-white/5 dark:text-slate-300">proto: …</span>
        {{if .User}}
          <span class="hidden text-sm muted sm:inline">Hi, <span class="font-semibold text-slate-700 dark:text-slate-200">{{.User.Name}}</span></span>
        {{end}}
        <button id="theme-toggle" type="button" class="icon-btn" aria-label="Toggle dark mode" title="Toggle theme">
          <svg class="hidden h-5 w-5 dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2m0 14v2m9-9h-2M5 12H3m15.36 6.36-1.42-1.42M7.06 7.06 5.64 5.64m12.72 0-1.42 1.42M7.06 16.94l-1.42 1.42M16 12a4 4 0 1 1-8 0 4 4 0 0 1 8 0Z"/></svg>
          <svg class="h-5 w-5 dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>
        </button>
        {{if .User}}
          <a href="/logout" class="btn-secondary px-3 py-1.5 text-xs">Log out</a>
        {{end}}
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-8">
{{end}}

{{define "foot"}}
  </main>
  <footer class="mx-auto max-w-6xl px-4 py-10 text-center text-xs muted">
    Served over <span class="font-semibold text-emerald-600 dark:text-emerald-400">HTTP/3 + QUIC</span>
    · live updates via QUIC DATAGRAMs / WebTransport · built by sinki
  </footer>
  <div id="toast" class="pointer-events-none fixed bottom-5 right-5 z-50 translate-y-2 rounded-xl border border-white/10 bg-slate-900/95 px-4 py-2.5 text-sm font-medium text-white opacity-0 shadow-2xl backdrop-blur transition-all duration-300 dark:bg-slate-800/95"></div>
  <script src="/static/app.js"></script>
</body>
</html>
{{end}}
