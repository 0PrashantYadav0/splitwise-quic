{{define "group"}}{{template "head" .}}
<div hx-ext="sse" sse-connect="/g/{{.Group.ID}}/events">
  <!-- Group header -->
  <div class="mb-6">
    <a href="/" class="link text-sm">&larr; all groups</a>
    <div class="mt-3 flex flex-wrap items-start justify-between gap-3">
      <div class="flex min-w-0 items-center gap-3">
        <span class="grid h-12 w-12 shrink-0 place-items-center rounded-2xl bg-gradient-to-br from-emerald-500 to-teal-600 text-xl font-bold text-white shadow-lg shadow-emerald-600/20">{{slice .Group.Name 0 1}}</span>
        <div class="min-w-0">
          <h1 class="truncate text-2xl font-extrabold tracking-tight text-white">{{.Group.Name}}</h1>
          <div class="mt-1 flex flex-wrap items-center gap-1">
            {{range .Group.Members}}
              <span class="pill border border-white/[.07] bg-white/5 text-slate-400">{{.Name}}</span>
            {{end}}
          </div>
        </div>
      </div>
      <div class="pill shrink-0 border border-white/[.07] bg-white/5">
        <span id="live-dot" class="inline-block h-2 w-2 rounded-full bg-slate-600"></span>
        <span id="live-text" class="text-xs text-slate-500">connecting…</span>
      </div>
    </div>
  </div>

  <!-- Mobile section tab bar — hidden on sm+ (grid layout takes over) -->
  <div class="mb-5 flex gap-1 rounded-2xl border border-white/[.07] bg-white/[.03] p-1 sm:hidden"
       id="mobile-tabs" role="tablist" aria-label="Section navigation">
    <button type="button" data-col="grp-main-col" role="tab" aria-selected="true"
            class="mobile-tab active-tab flex-1 rounded-xl py-2.5 text-sm font-semibold text-white transition-all bg-white/10">
      <span class="flex items-center justify-center gap-1.5">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2"/>
        </svg>
        Expenses
      </span>
    </button>
    <button type="button" data-col="grp-side-col" role="tab" aria-selected="false"
            class="mobile-tab flex-1 rounded-xl py-2.5 text-sm font-semibold text-slate-500 transition-all">
      <span class="flex items-center justify-center gap-1.5">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
        </svg>
        Balances
      </span>
    </button>
  </div>

  <div class="grid gap-6 lg:grid-cols-3">
    <!-- Left: add expense + expense list -->
    <section class="space-y-6 lg:col-span-2" id="grp-main-col">
      {{template "expense_form_card" .Form}}

      <div class="card">
        <div class="mb-4 flex items-center justify-between gap-2">
          <h2 class="card-title mb-0">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2"/>
            </svg>
            Expenses
          </h2>
          <div class="flex items-center gap-1.5">
            <a href="/g/{{.Group.ID}}/export.csv" class="btn-ghost" title="Download CSV">CSV</a>
            <a href="/g/{{.Group.ID}}/export.pdf" class="btn-ghost" title="Download PDF">PDF</a>
          </div>
        </div>
        <div id="expenses" hx-get="/g/{{.Group.ID}}/expenses" hx-trigger="load, sse:update" hx-swap="innerHTML"></div>
      </div>
    </section>

    <!-- Right: balances, settle-up, member, activity -->
    <aside class="space-y-5" id="grp-side-col">
      <div class="card">
        <h2 class="card-title">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
          </svg>
          Balances &amp; settle up
        </h2>
        <div id="balances" hx-get="/g/{{.Group.ID}}/balances" hx-trigger="load, sse:update" hx-swap="innerHTML"></div>
      </div>

      <div class="card">
        <h2 class="card-title">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M18 9v6m3-3h-6m-3-4a4 4 0 1 1-8 0 4 4 0 0 1 8 0ZM2 20a6 6 0 0 1 12 0"/>
          </svg>
          Add member
        </h2>
        <form method="post" action="/g/{{.Group.ID}}/members" class="flex gap-2">
          <select name="user_id" class="input">
            {{range .AllUsers}}<option value="{{.ID}}">{{.Name}} ({{.Email}})</option>{{end}}
          </select>
          <button class="btn-secondary shrink-0 px-4">Add</button>
        </form>
      </div>

      <div class="card">
        <h2 class="card-title">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7Z"/>
          </svg>
          Activity
        </h2>
        <div id="activity" hx-get="/g/{{.Group.ID}}/activity" hx-trigger="load, sse:update" hx-swap="innerHTML"></div>
      </div>
    </aside>
  </div>
</div>
{{template "foot" .}}{{end}}
